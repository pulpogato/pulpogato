      <div id="user-content-preamble" dir="auto">
      <div dir="auto">
      <div dir="auto">
      <p dir="auto">Pulpogato is a java client for GitHub.</p>
      </div>
      <div dir="auto">
      <p dir="auto"><span><a target="_blank" rel="noopener noreferrer" href="images/Pulpogato.png"><img src="images/Pulpogato.png" alt="Pulpogato logo. An octocat in the style of Pablo Picasso." width="300" style="max-width: 100%;"></a></span></p>
      </div>
