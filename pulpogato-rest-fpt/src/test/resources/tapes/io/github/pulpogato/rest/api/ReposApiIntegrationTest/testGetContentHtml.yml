      <div class="markdown-heading" dir="auto"><h2 id="user-content-development" class="heading-element" dir="auto">Development</h2><a id="user-content-development" class="anchor" aria-label="Permalink: Development" href="#development"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <div dir="auto">
      <p dir="auto">Install JDK 21 first.</p>
      </div>
      <div dir="auto">
      <p dir="auto">To build, run <code>./gradlew build</code>.
      If you have low memory or CPU, you can customize parallelism with <code>--max-workers</code>.</p>
      </div>
      <div dir="auto">
      <div class="markdown-heading" dir="auto"><h3 id="user-content-automatically-generated-tests" class="heading-element" dir="auto">Automatically generated tests</h3><a id="user-content-automatically-generated-tests" class="anchor" aria-label="Permalink: Automatically generated tests" href="#automatically-generated-tests"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <p dir="auto">When the REST schema contains examples, they are automatically converted to tests in the generated test sources directory.</p>
      </div>
      </div>
      <div dir="auto">
      <div class="markdown-heading" dir="auto"><h3 id="user-content-integration-tests" class="heading-element" dir="auto">Integration tests</h3><a id="user-content-integration-tests" class="anchor" aria-label="Permalink: Integration tests" href="#integration-tests"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <p dir="auto">To contribute a test for the REST API or GraphQL API:</p>
      </div>
      <div dir="auto">
      <ol dir="auto">
      <li>
      <p dir="auto">Write a test like the ones in <code>UserApiIntegrationTest</code>.</p>
      </li>
      <li>
      <p dir="auto">Then set up the environment variable <code>GITHUB_TOKEN</code>.</p>
      </li>
      <li>
      <p dir="auto"><strong>If you’re running a test against a GitHub Enterprise</strong> instance, set up <code>GITHUB_HOST</code> and <code>GITHUB_PORT</code> as well.</p>
      </li>
      <li>
      <p dir="auto">Run a command like <code>./gradlew :pulpogato-rest-fpt:test --tests AppsApiIntegrationTest</code>.</p>
      <div dir="auto">
      <div dir="auto">
      <div class="highlight highlight-source-shell notranslate position-relative overflow-auto" dir="auto" data-snippet-clipboard-copy-content="GITHUB_TOKEN=$(gh auth token) \
          ./gradlew :pulpogato-rest-fpt:test --tests AppsApiIntegrationTest"><pre>GITHUB_TOKEN=<span class="pl-s"><span class="pl-pds">$(</span>gh auth token<span class="pl-pds">)</span></span> \
          ./gradlew :pulpogato-rest-fpt:test --tests AppsApiIntegrationTest</pre></div>
      </div>
      </div>
      <div dir="auto">
      <p dir="auto">Or if you’re using GHES:</p>
      </div>
      <div dir="auto">
      <div dir="auto">
      <div class="highlight highlight-source-shell notranslate position-relative overflow-auto" dir="auto" data-snippet-clipboard-copy-content="GITHUB_TOKEN=$(gh auth token) GITHUB_HOST=ghes.example.com GITHUB_PORT=8443 \
          ./gradlew :pulpogato-rest-ghes-3.17:test --tests AppsApiIntegrationTest"><pre>GITHUB_TOKEN=<span class="pl-s"><span class="pl-pds">$(</span>gh auth token<span class="pl-pds">)</span></span> GITHUB_HOST=ghes.example.com GITHUB_PORT=8443 \
          ./gradlew :pulpogato-rest-ghes-3.17:test --tests AppsApiIntegrationTest</pre></div>
      </div>
      </div>
      </li>
      <li>
      <p dir="auto">That generates a yaml file in <code>src/test/resources</code>. If it needs cleaning up for sensitive data, do so.</p>
      </li>
      </ol>
      </div>
      </div>
      <div dir="auto">
      <div class="markdown-heading" dir="auto"><h3 id="user-content-rest-webhook-tests" class="heading-element" dir="auto">REST Webhook tests</h3><a id="user-content-rest-webhook-tests" class="anchor" aria-label="Permalink: REST Webhook tests" href="#rest-webhook-tests"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <p dir="auto">To contribute a Webhook test:</p>
      </div>
      <div dir="auto">
      <ol dir="auto">
      <li>
      <p dir="auto">Capture the HTTP request from the webhook using any tool. If you’re looking at public data, something like RequestBin is useful.</p>
      </li>
      <li>
      <p dir="auto">Clean up the data and place it in <code>pulpogato-rest-tests/src/main/resources/webhooks/</code> under the right directory based on the <code>x-github-event</code> header.</p>
      </li>
      <li>
      <p dir="auto">Verify the tests work.</p>
      </li>
      </ol>
      </div>
      </div>
      <div dir="auto">
      <div class="markdown-heading" dir="auto"><h3 id="user-content-schema-additions" class="heading-element" dir="auto">Schema additions</h3><a id="user-content-schema-additions" class="anchor" aria-label="Permalink: Schema additions" href="#schema-additions"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <p dir="auto">GitHub’s OpenAPI schema may sometimes be incomplete or missing properties that exist in the actual API responses.
      Pulpogato supports extending OpenAPI documents through <code>*.schema.json</code> files.</p>
      </div>
      <div dir="auto">
      <p dir="auto">Schema additions are loaded from two locations:</p>
      </div>
      <div dir="auto">
      <ol dir="auto">
      <li>
      <p dir="auto"><code>pulpogato-common/src/main/resources/</code> - additions that apply to all REST modules</p>
      </li>
      <li>
      <p dir="auto"><code>pulpogato-rest-&lt;version&gt;/src/main/resources/</code> - additions specific to a single version</p>
      </li>
      </ol>
      </div>
      <div dir="auto">
      <p dir="auto">The files follow the OpenAPI 3.1.0 format and are merged additively with optional deletion markers:</p>
      </div>
      <div dir="auto">
      <ul dir="auto">
      <li>
      <p dir="auto"><code>components.schemas</code> entries can add new schemas or new properties to existing schemas.</p>
      </li>
      <li>
      <p dir="auto"><code>paths</code> entries can add missing endpoint details (for example additional response media types).</p>
      </li>
      <li>
      <p dir="auto">Setting any override node to <code>null</code> deletes the corresponding node from the base schema.</p>
      </li>
      </ul>
      </div>
      <details>
      <summary>Example: <code>user.suspendedAt.schema.json</code></summary>
      <div dir="auto">
      <div dir="auto">
      <div dir="auto">
      <div class="highlight highlight-source-json notranslate position-relative overflow-auto" dir="auto" data-snippet-clipboard-copy-content="{
        &quot;openapi&quot;: &quot;3.1.0&quot;,
        &quot;info&quot;: {
          &quot;title&quot;: &quot;Additions Schema&quot;,
          &quot;version&quot;: &quot;1.0.0&quot;
        },
        &quot;components&quot;: {
          &quot;schemas&quot;: {
            &quot;public-user&quot;: {
              &quot;properties&quot;: {
                &quot;suspended_at&quot;: {
                  &quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],
                  &quot;format&quot;: &quot;date-time&quot;,
                  &quot;description&quot;: &quot;https://github.com/github/rest-api-description/issues/5667&quot;
                }
              }
            }
          }
        },
        &quot;paths&quot;: {}
      }"><pre>{
        <span class="pl-ent">"openapi"</span>: <span class="pl-s"><span class="pl-pds">"</span>3.1.0<span class="pl-pds">"</span></span>,
        <span class="pl-ent">"info"</span>: {
          <span class="pl-ent">"title"</span>: <span class="pl-s"><span class="pl-pds">"</span>Additions Schema<span class="pl-pds">"</span></span>,
          <span class="pl-ent">"version"</span>: <span class="pl-s"><span class="pl-pds">"</span>1.0.0<span class="pl-pds">"</span></span>
        },
        <span class="pl-ent">"components"</span>: {
          <span class="pl-ent">"schemas"</span>: {
            <span class="pl-ent">"public-user"</span>: {
              <span class="pl-ent">"properties"</span>: {
                <span class="pl-ent">"suspended_at"</span>: {
                  <span class="pl-ent">"type"</span>: [<span class="pl-s"><span class="pl-pds">"</span>string<span class="pl-pds">"</span></span>, <span class="pl-s"><span class="pl-pds">"</span>null<span class="pl-pds">"</span></span>],
                  <span class="pl-ent">"format"</span>: <span class="pl-s"><span class="pl-pds">"</span>date-time<span class="pl-pds">"</span></span>,
                  <span class="pl-ent">"description"</span>: <span class="pl-s"><span class="pl-pds">"</span>https://github.com/github/rest-api-description/issues/5667<span class="pl-pds">"</span></span>
                }
              }
            }
          }
        },
        <span class="pl-ent">"paths"</span>: {}
      }</pre></div>
      </div>
      </div>
      </div>
      </details>
      <div dir="auto">
      <p dir="auto">This adds the <code>suspended_at</code> property to the <code>public-user</code> schema.
      The property will be available as <code>suspendedAt</code> in the generated Java code.</p>
      </div>
      </div>
      <div dir="auto">
      <div class="markdown-heading" dir="auto"><h3 id="user-content-asciidoctor-docs" class="heading-element" dir="auto">Asciidoctor docs</h3><a id="user-content-asciidoctor-docs" class="anchor" aria-label="Permalink: Asciidoctor docs" href="#asciidoctor-docs"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <p dir="auto">To run asciidoctor locally, run this command.</p>
      </div>
      <div dir="auto">
      <div dir="auto">
      <div class="highlight highlight-source-shell notranslate position-relative overflow-auto" dir="auto" data-snippet-clipboard-copy-content="./gradlew asciidoctorDocs"><pre>./gradlew asciidoctorDocs</pre></div>
      </div>
      </div>
      <div dir="auto">
      <p dir="auto">This task uses <code>asciidoctor/docker-asciidoctor:main</code> and writes output to <code>pulpogato-docs/build/index.html</code>.</p>
      </div>
      </div>
