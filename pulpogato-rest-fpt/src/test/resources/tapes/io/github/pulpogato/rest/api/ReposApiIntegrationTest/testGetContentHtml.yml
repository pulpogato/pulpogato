      <div dir="auto">
      <div class="markdown-heading" dir="auto"><h2 id="user-content-usage" class="heading-element" dir="auto">Usage</h2><a id="user-content-usage" class="anchor" aria-label="Permalink: Usage" href="#usage"><svg class="octicon octicon-link" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"></path></svg></a></div>
      <div dir="auto">
      <div dir="auto">
      <p dir="auto">For releases, use mavenCentral.</p>
      </div>
      <div dir="auto">
      <div dir="auto">
      <div class="snippet-clipboard-content notranslate position-relative overflow-auto" data-snippet-clipboard-copy-content="https://repo.maven.apache.org/maven2/"><pre class="notranslate"><code>https://repo.maven.apache.org/maven2/</code></pre></div>
      </div>
      </div>
      <div dir="auto">
      <p dir="auto">For snapshots, use this url.</p>
      </div>
      <div dir="auto">
      <div dir="auto">
      <div class="snippet-clipboard-content notranslate position-relative overflow-auto" data-snippet-clipboard-copy-content="https://central.sonatype.com/repository/maven-snapshots/"><pre class="notranslate"><code>https://central.sonatype.com/repository/maven-snapshots/</code></pre></div>
      </div>
      </div>
      <div dir="auto">
      <p dir="auto">The maven group id is <code>io.github.pulpogato</code>.</p>
      </div>
      <div dir="auto">
      <p dir="auto">Most maven artifact ids are <code>pulpogato-&lt;api-type&gt;-&lt;gh-version&gt;</code>.</p>
      </div>
      <div dir="auto">
      <p dir="auto">The <code>api-type</code> is one of <code>graphql</code> or <code>rest</code>.</p>
      </div>
      <div dir="auto">
      <p dir="auto">The <code>gh-version</code> is one of <code>ghec</code>,<code>fpt</code>, or <code>ghes-&lt;GHES-version&gt;</code>.</p>
      </div>
      <div dir="auto">
      <p dir="auto">To align versions across all Pulpogato modules, use <code>io.github.pulpogato:pulpogato-bom</code>.</p>
      </div>
