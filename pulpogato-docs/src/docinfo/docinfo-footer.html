<script>
(function () {
    var copyEmoji = {
        copy: "📋",
        copied: "✅",
        failed: "❌",
    };

    var copyLabels = {
        copy: "Copy code block",
        copied: "Copied",
        failed: "Copy failed",
    };

    function setButtonIcon(button, state) {
        button.textContent = copyEmoji[state];
        button.setAttribute("aria-label", copyLabels[state]);
        if (state !== "copy") {
            window.setTimeout(function () {
                setButtonIcon(button, "copy");
            }, 1200);
        }
    }

    function addCopyButton(listingBlock) {
        var content = listingBlock.querySelector(":scope > .content");
        var code = listingBlock.querySelector("pre code");

        if (!content || !code) {
            return;
        }

        var button = document.createElement("button");
        button.className = "copy-code-button";
        button.type = "button";
        setButtonIcon(button, "copy");
        button.addEventListener("click", function () {
            navigator.clipboard.writeText(code.textContent).then(
                function () {
                    setButtonIcon(button, "copied");
                },
                function () {
                    setButtonIcon(button, "failed");
                },
            );
        });
        content.appendChild(button);
    }

    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".listingblock").forEach(addCopyButton);
    });
})();
</script>
