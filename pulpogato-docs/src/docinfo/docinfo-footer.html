<script>
(function () {
    function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }

        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();

        try {
            document.execCommand("copy");
            return Promise.resolve();
        } catch (error) {
            return Promise.reject(error);
        } finally {
            document.body.removeChild(textarea);
        }
    }

    var copyEmoji = {
        copy: "📋",
        copied: "✅",
        failed: "❌",
    };

    var copyLabels = {
        copy: "Copy code block",
        copied: "Copied",
        failed: "Copy failed",
    };

    function setButtonIcon(button, state) {
        button.textContent = copyEmoji[state];
        button.setAttribute("aria-label", copyLabels[state]);
        if (state !== "copy") {
            window.setTimeout(function () {
                setButtonIcon(button, "copy");
            }, 1200);
        }
    }

    function addCopyButton(listingBlock) {
        var content = listingBlock.querySelector(":scope > .content");
        var code = listingBlock.querySelector("pre code");

        if (!content || !code) {
            return;
        }

        var button = document.createElement("button");
        button.className = "copy-code-button";
        button.type = "button";
        setButtonIcon(button, "copy");
        button.addEventListener("click", function () {
            copyText(code.innerText).then(
                function () {
                    setButtonIcon(button, "copied");
                },
                function () {
                    setButtonIcon(button, "failed");
                },
            );
        });
        content.appendChild(button);
    }

    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".listingblock").forEach(addCopyButton);
    });
})();
</script>
