name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - "releases/*" # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }} # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0 # a full history is required for pull request analysis
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: zulu
      - name: "Qodana Scan"
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          # Native mode so Gradle Daemon JVM criteria can use the JDK from setup-java
          # (Docker mode only has JBR 25 and cannot download toolchain 21 without URLs).
          args: --within-docker false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1577463682 }}
          QODANA_ENDPOINT: "https://qodana.cloud"
